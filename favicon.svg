<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0A0A0B"/>
  <!-- subtle grid pattern -->
  <g stroke="#1C1C22" stroke-width="1">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>
  <!-- editorial A: serif, optical -->
  <text x="32" y="46" text-anchor="middle"
        font-family="Georgia, 'Fraunces', serif"
        font-size="42" font-weight="700"
        fill="#ECECEC"
        letter-spacing="-0.04em">A</text>
  <!-- live signal cursor -->
  <rect x="44" y="14" width="6" height="14" fill="#C8FF4D"/>
</svg>
